<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Universal Site Loader</title>

  <script>
    const sites = [
          // { url: "https://freeltc.fun/faucet", start: "00:05", end: "22:55", opened: false }, 
         { url: "https://excoinbit.online/coin-ltc/", start: "00:00", end: "23:59", opened: false },
         { url: "https://dogezone.xyz/claim-trx/", start: "00:00", end: "23:58", opened: false },
               { url: "https://ex-faucet.xyz/faucet-ltc/", start: "00:00", end: "23:58", opened: false }
     // { url: "https://t.me/satoshifaucetbot/app?startapp", start: "06:00", end: "07:59", opened: false },
     // { url: "https://t.me/bitfaucetgbot/app?startapp", start: "08:00", end: "08:59", opened: false },
         //{ url: "https://mix-crypto.com/litecoin/?r=ciferglas@gmail.com", start: "00:00", end: "02:29", opened: false },
        // { url: "https://earncryptowrs.in/faucet/currency/ltc", start: "11:00", end: "17:15", opened: false },
       //{ url: "https://coinpin.top/faucet", start: "22:00", end: "23:15", opened: false }
      // добавляй столько сайтов, сколько нужно
    ];

     // ======= ФУНКЦИИ =======
    function toMinutes(hhmm) {
      let [h, m] = hhmm.split(":").map(Number);
      return h * 60 + m;
    }

    // Функция для открытия сайта с задержкой
    function openSiteWithDelay(url, delayMs) {
      setTimeout(() => {
        window.open(url, "_blank");
        console.log(`Открыт сайт: ${url} в ${new Date().toTimeString().slice(0,5)}`);
      }, delayMs);
    }

    function checkSchedule() {
      let now = new Date();
      let currentMinutes = now.getHours() * 60 + now.getMinutes();
      
      // Счетчик для задержки
      let delayCounter = 0;

      sites.forEach(site => {
        let startMinutes = toMinutes(site.start);
        let endMinutes = toMinutes(site.end);

        // если текущее время в интервале и сайт еще не открыт
        if (currentMinutes >= startMinutes && currentMinutes <= endMinutes && !site.opened) {
          // Открываем с задержкой 5 секунд * номер сайта в очереди
          openSiteWithDelay(site.url, 35000 * delayCounter);
          site.opened = true;
          delayCounter++;
        }
      });
      
      if (delayCounter > 0) {
        console.log(`Запланировано открытие ${delayCounter} сайтов с интервалом 5 секунд`);
      }
    }

    // ======= ЗАПУСК =======
    window.onload = checkSchedule;
    setInterval(checkSchedule, 60 * 1000); // проверка каждую минуту
  </script>
</head>
<body>
  <h2>Автоматический запуск сайтов</h2>
  <p>Сайты будут открываться по расписанию в указанном интервале.</p>
  <p>⏱️ Между открытиями будет пауза 5 секунд.</p>
  <p>Это окно можно свернуть.</p>
</body>
</html>

</body>
</html>
