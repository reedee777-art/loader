<head>
  <meta charset="UTF-8">
  <title>Universal Site Loader</title>

  <script>
    // ======= НАСТРОЙКИ САЙТОВ =======
    const sites = [
      { url: "https://tinyurl.com/546fsen9", start: "15:00", end: "15:30", opened: false },
     { url: "https://tinyurl.com/546fsen9", start: "09:00", end: "09:30", opened: false },
              { url: "https://claimtrx.com/ptc", start: "13:00", end: "13:49", opened: false },
        { url: "https://c.moviesitm.com.de/claim.php", start: "10:00", end: "19:40", opened: false },
     // { url: "https://gamefaucet.fun", start: "15:00", end: "18:00", opened: false },
      { url: "https://freeltc.online/faucet", start: "14:00", end: "14:30", opened: false },
      { url: "https://freeltc.online/links/pre_verify/50", start: "12:00", end: "12:30", opened: false },
      { url: "https://freeltc.online/faucet", start: "13:00", end: "17:50", opened: false },
      { url: "https://freebch.in", start: "20:10", end: "23:30", opened: false },
        { url: "https://freebch.in", start: "00:00", end: "23:30", opened: false },
              { url: "https://claimtrx.com/faucet", start: "07:00", end: "18:00", opened: false },
        { url: "https://claimtrx.com/ptc", start: "12:00", end: "12:49", opened: false },
        { url: "https://feyorra.top/ptc", start: "13:00", end: "13:40", opened: false },
      { url: "https://bitupdate.info/faucet", start: "17:00", end: "18:25", opened: false },
      { url: "https://ourcoincash.xyz/faucet", start: "10:00", end: "13:30", opened: false },
      { url: "https://coinpin.top/faucet", start: "21:00", end: "23:50", opened: false },
      { url: "https://bitupdate.info/madfaucet", start: "19:00", end: "22:40", opened: false }
    ];

     // ======= ФУНКЦИИ =======
    function toMinutes(hhmm) {
      let [h, m] = hhmm.split(":").map(Number);
      return h * 60 + m;
    }

    // Функция для открытия сайта с задержкой
    function openSiteWithDelay(url, delayMs) {
      setTimeout(() => {
        window.open(url, "_blank");
        console.log(`Открыт сайт: ${url} в ${new Date().toTimeString().slice(0,5)}`);
      }, delayMs);
    }

    function checkSchedule() {
      let now = new Date();
      let currentMinutes = now.getHours() * 60 + now.getMinutes();
      
      // Счетчик для задержки
      let delayCounter = 0;

      sites.forEach(site => {
        let startMinutes = toMinutes(site.start);
        let endMinutes = toMinutes(site.end);

        // если текущее время в интервале и сайт еще не открыт
        if (currentMinutes >= startMinutes && currentMinutes <= endMinutes && !site.opened) {
          // Открываем с задержкой 5 секунд * номер сайта в очереди
          openSiteWithDelay(site.url, 5000 * delayCounter);
          site.opened = true;
          delayCounter++;
        }
      });
      
      if (delayCounter > 0) {
        console.log(`Запланировано открытие ${delayCounter} сайтов с интервалом 5 секунд`);
      }
    }

    // ======= ЗАПУСК =======
    window.onload = checkSchedule;
    setInterval(checkSchedule, 60 * 1000); // проверка каждую минуту
  </script>
</head>
<body>
  <h2>Автоматический запуск сайтов</h2>
  <p>Сайты будут открываться по расписанию в указанном интервале.</p>
  <p>⏱️ Между открытиями будет пауза 5 секунд.</p>
  <p>Это окно можно свернуть.</p>
</body>
