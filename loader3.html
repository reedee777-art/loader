<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Universal Site Loader</title>

  <script>
    // ======= НАСТРОЙКИ САЙТОВ =======
    const sites = [
      { url: "https://tinyurl.com/546fsen9", start: "18:00", end: "23:00", opened: false },
      { url: "https://gamefaucet.fun", start: "15:00", end: "18:00", opened: false },
      { url: "https://freeltc.online/faucet", start: "14:00", end: "14:30", opened: false },
      { url: "https://freeltc.online/links/pre_verify/50", start: "12:00", end: "12:30", opened: false },
      { url: "https://freeltc.online/links/pre_verify/51", start: "13:30", end: "14:00", opened: false },
      { url: "https://freeltc.online/links/pre_verify/73", start: "15:30", end: "16:00", opened: false },
      { url: "https://freeltc.online/faucet", start: "16:00", end: "23:59", opened: false },
      { url: "https://freebch.in", start: "00:00", end: "23:30", opened: false },
      { url: "https://claimtrx.com/faucet", start: "09:00", end: "18:00", opened: false },
      { url: "https://bitupdate.info/faucet", start: "18:00", end: "18:55", opened: false },
      { url: "https://ourcoincash.xyz/faucet", start: "10:00", end: "11:30", opened: false },
      { url: "https://coinpin.top/faucet", start: "21:00", end: "23:50", opened: false },
      { url: "https://bitupdate.info/madfaucet", start: "19:00", end: "20:40", opened: false }
    ];

    // ======= ФУНКЦИИ =======
    function toMinutes(hhmm) {
      let [h, m] = hhmm.split(":").map(Number);
      return h * 60 + m;
    }

    // Открытие сайта
    function openSiteWithDelay(url, delayMs, isLast = false) {
      setTimeout(() => {

        // открываем сайт
        let win = window.open(url, "_blank");

        console.log(`Открыт сайт: ${url}`);

        // если это последний сайт → через 5 сек редирект на about:blank
        if (isLast && win) {
          setTimeout(() => {
            try {
              win.location.href = "about:blank";
              console.log("Последняя вкладка переведена на about:blank");
            } catch (e) {
              console.log("Не удалось сделать редирект:", e);
            }
          }, 5000); // ждать 5 сек после открытия
        }

      }, delayMs);
    }

    function checkSchedule() {

      let now = new Date();
      let currentMinutes = now.getHours() * 60 + now.getMinutes();

      let queue = [];

      // собираем сайты на открытие
      sites.forEach(site => {

        let startMinutes = toMinutes(site.start);
        let endMinutes = toMinutes(site.end);

        if (
          currentMinutes >= startMinutes &&
          currentMinutes <= endMinutes &&
          !site.opened
        ) {
          queue.push(site);
          site.opened = true;
        }
      });

      // открываем по очереди
      queue.forEach((site, index) => {

        let isLast = index === queue.length - 1;

        openSiteWithDelay(
          site.url,
          15000 * index,
          isLast
        );
      });

      if (queue.length > 0) {
        console.log(`Запланировано ${queue.length} сайтов`);
      }
    }

    // ======= ЗАПУСК =======
    window.onload = checkSchedule;

    // проверка каждую минуту
    setInterval(checkSchedule, 60 * 1000);

  </script>
</head>

<body>
  <h2>Автоматический запуск сайтов</h2>

  <p>Сайты будут открываться по расписанию.</p>

  <p>Последний открытый сайт автоматически уйдет на about:blank.</p>

</body>
</html>
